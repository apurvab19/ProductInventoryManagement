services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: product-inventory-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: product-inventory-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=ProductInventoryDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;Encrypt=False"
      Jwt__Issuer: "ProductInventory.API"
      Jwt__Audience: "ProductInventory.Client"
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__AccessTokenMinutes: "15"
      Jwt__RefreshTokenDays: "7"
      SeedAdmin__Username: "${ADMIN_USERNAME}"
      SeedAdmin__Password: "${ADMIN_PASSWORD}"
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    restart: on-failure

volumes:
  sqlserver_data:
